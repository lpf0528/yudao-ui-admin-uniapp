name: 移动端 H5 - 构建推送 DockerHub 镜像

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - .gitignore
      - '.vscode/**'
      - '.image/**'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  # Docker Hub 仓库名，格式：dockerhub用户名/仓库名
  IMAGE_NAME: eatsleeprun/yudao-ui-admin-uniapp

jobs:
  # ─────────────────────────────────────────────
  # 1. 构建预检
  # ─────────────────────────────────────────────
  lint:
    name: 构建预检
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 生成基础配置文件
        run: pnpm init-baseFiles

      - name: H5 生产构建
        run: pnpm build:h5

  # ─────────────────────────────────────────────
  # 2. 构建并推送镜像
  # ─────────────────────────────────────────────
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    needs: [lint]
    if: always() && (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    outputs:
      image_full: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 生成镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref_name == 'master' || github.ref_name == 'main' }}
          labels: |
            org.opencontainers.image.title=yudao-ui-admin-uniapp
            org.opencontainers.image.description=芋道管理后台移动端 H5（uni-app）
            org.opencontainers.image.revision=${{ github.sha }}

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}-cache:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}-cache:buildcache,mode=max
          provenance: false
          sbom: false

      - name: 输出构建结果
        run: |
          echo "## 🚀 镜像推送成功" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: 部署到服务器
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'master' || github.ref_name == 'main'
    steps:
      - name: SSH 远程部署
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          request_pty: true
          script: |
            cd /opt/deployments

            echo "▶ 拉取最新镜像"
            sudo docker compose pull yudao-ui-uniapp

            echo "▶ 重启服务"
            sudo docker compose up -d yudao-ui-uniapp

            echo "▶ 清理旧镜像"
            sudo docker image prune -f

            echo "✅ 移动端 H5 部署完成"

      - name: 输出部署结果
        run: |
          echo "## ✅ 移动端 H5 部署成功" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | \`docker.io/eatsleeprun/yudao-ui-admin-uniapp:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 服务器 | \`${{ secrets.SERVER_HOST }}\` |" >> $GITHUB_STEP_SUMMARY

  notify:
    name: 通知
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: always()
    steps:
      - name: 成功通知
        if: needs.build-and-push.result == 'success'
        run: |
          echo "✅ 构建成功：${{ needs.build-and-push.outputs.image_full }}"

      - name: 失败通知
        if: needs.build-and-push.result == 'failure'
        run: |
          echo "❌ 构建失败，请检查 Actions 日志"
